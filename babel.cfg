# Babel message extraction configuration.
# Extract strings:  pybabel extract -F babel.cfg -o translations/messages.pot .
# Update catalogs:  pybabel update -i translations/messages.pot -d translations
# Compile to .mo:   pybabel compile -d translations

[python: app/**.py]
[jinja2: app/templates/**.html]
extensions=jinja2.ext.i18n
encoding=utf-8
