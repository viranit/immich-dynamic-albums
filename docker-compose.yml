services:
  web:
    build: .
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-5000}:5000"
    environment:
      FLASK_ENV: production
      SECRET_KEY: ${SECRET_KEY:?err}
      DATABASE_URL: postgresql://immich_albums:immich_albums@db:5432/immich_albums
      IMMICH_URL: ${IMMICH_URL:-}
      IMMICH_API_KEY: ${IMMICH_API_KEY:-}
      AUTH_METHOD: ${AUTH_METHOD:-immich}
      OIDC_ISSUER_URL: ${OIDC_ISSUER_URL:-}
      OIDC_CLIENT_ID: ${OIDC_CLIENT_ID:-}
      OIDC_CLIENT_SECRET: ${OIDC_CLIENT_SECRET:-}
      GLOBAL_SYNC_INTERVAL: ${GLOBAL_SYNC_INTERVAL:-60}
      SYNC_ENABLED: ${SYNC_ENABLED:-true}
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
    volumes:
      - ./logs:/app/logs

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: immich_albums
      POSTGRES_USER: immich_albums
      POSTGRES_PASSWORD: immich_albums
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U immich_albums -d immich_albums"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
